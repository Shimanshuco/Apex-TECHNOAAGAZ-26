<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>TechnoAagaz 2026 | Apex University Tech Fest - Jaipur's Biggest Technical Festival</title>
    <meta name="description" content="TechnoAagaz 2026 - Apex University's flagship technical festival in Jaipur. Join exciting tech competitions, workshops, hackathons, robotics challenges & cultural events. Register now!" />
    <meta name="keywords" content="TechnoAagaz, Apex University, tech fest, technical festival, Jaipur, hackathon, robotics, coding competition, workshops, college fest 2026" />
    <meta name="author" content="Apex University, Jaipur" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://technoaagaz.apexuniversity.co.in" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://technoaagaz.apexuniversity.co.in" />
    <meta property="og:title" content="TechnoAagaz 2026 | Apex University Tech Fest" />
    <meta property="og:description" content="Jaipur's biggest technical festival - TechnoAagaz 2026 at Apex University. Competitions, workshops, hackathons & more!" />
    <meta property="og:image" content="/Background.png" />
    <meta property="og:site_name" content="TechnoAagaz 2026" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://technoaagaz.apexuniversity.co.in" />
    <meta name="twitter:title" content="TechnoAagaz 2026 | Apex University Tech Fest" />
    <meta name="twitter:description" content="Join Jaipur's biggest technical festival - TechnoAagaz 2026 at Apex University!" />
    <meta name="twitter:image" content="/Background.png" />
    
    <!-- Theme & PWA -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Font loading with display swap for faster rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Event",
      "name": "TechnoAagaz 2026",
      "description": "Apex University's flagship technical festival featuring competitions, workshops, hackathons, robotics challenges and cultural events",
      "startDate": "2026-03-12",
      "endDate": "2026-03-14",
      "eventStatus": "https://schema.org/EventScheduled",
      "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
      "location": {
        "@type": "Place",
        "name": "Apex University",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Jaipur",
          "addressRegion": "Rajasthan",
          "addressCountry": "IN"
        }
      },
      "organizer": {
        "@type": "Organization",
        "name": "Apex University",
        "url": "https://www.apexuniversity.co.in"
      },
      "image": "/Background.png"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
